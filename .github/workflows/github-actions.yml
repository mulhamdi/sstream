# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ['main']

  workflow_dispatch:

  schedule:
    - cron: '0 */12 * * *'

# Sets the GITHUB_TOKEN permissions to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Run cf-clearance-scraper using Docker
      - name: Run cf-clearance-scraper using Docker
        run: |
          docker run -d --name cf-scraper -p 3000:3000 \
            -e PORT=3000 \
            -e browserLimit=20 \
            -e timeOut=60000 \
            zfcsoftware/cf-clearance-scraper:latest

      # Wait for a few seconds to ensure the service starts
      - name: Wait for cf-clearance-scraper to be ready
        run: |
          echo "Waiting for cf-clearance-scraper to be ready..."
          for i in {1..12}; do
            if curl -s http://localhost:3000/cf-clearance-scraper; then
              echo "cf-clearance-scraper is ready."
              break
            fi
            echo "Waiting..."
            sleep 5
          done

      # Check the container logs for any issues
      - name: Check Docker logs
        run: docker logs cf-scraper

      # Run scraping script
      - name: Run Anime Scraper Script
        run: node ./src/controllers/animeScraper.mjs

      # Commit updated anime list
      - name: Commit updated anime list
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update anime-list.json via scraping" || echo "No changes to commit"

      # Push changes
      - name: Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/mulhamdi/sstream.git HEAD:main


  # Job for deploying GitHub Pages
  deploy:
    needs: scrape
    if: success() || github.event_name == 'workflow_dispatch'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload dist folder
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
